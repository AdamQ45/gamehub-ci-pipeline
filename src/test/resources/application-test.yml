spring:
  application:
    name: game-service
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false
